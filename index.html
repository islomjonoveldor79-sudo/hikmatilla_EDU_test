<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0a0f1e"/>
<title>Testlyy</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;height:100%}
body{font-family:'Outfit',sans-serif;background:#0a0f1e;color:#e2e8f0;overflow-x:hidden;min-height:100vh}
:root{
  --bg:#0a0f1e;--bg2:#111827;--bg3:#1a2235;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --blue:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--purple:#8b5cf6;
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
input,select,button,textarea{font-family:'Outfit',sans-serif}
.fade{animation:fadeUp .35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.spin{animation:spin .8s linear infinite}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:9000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:28px;max-width:380px;width:100%;animation:fadeUp .2s ease}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:999999 !important;display:flex;align-items:center;justify-content:center;isolation:isolate}
.lightbox img{max-width:96vw;max-height:90vh;object-fit:contain;border-radius:8px;display:block;position:relative;z-index:1}
.gallery-wrap{position:relative;border-radius:12px;overflow:visible;background:var(--bg3);border:1px solid var(--border);margin-bottom:14px}
.gallery-img{width:100%;display:block;object-fit:contain;max-height:calc(100vh - 180px);min-height:280px;cursor:zoom-in;border-radius:12px}
.gnav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.65);border:none;color:#fff;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);z-index:2}

/* ── AUTH PAGES ── */
.auth-bg{min-height:100vh;background:radial-gradient(ellipse at 20% 20%,rgba(59,130,246,.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(139,92,246,.1) 0%,transparent 50%),var(--bg);display:flex;flex-direction:column}
.auth-nav{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--border);background:rgba(10,15,30,.8);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100;flex-shrink:0}
.auth-nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.auth-nav-logo-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.auth-nav-logo-text{font-weight:800;font-size:18px;color:var(--text);letter-spacing:-0.5px}
.auth-nav-links{display:flex;align-items:center;gap:8px}
.auth-body{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 16px 40px}
.auth-card{background:rgba(255,255,255,.03);border:1px solid var(--border2);border-radius:24px;padding:36px 32px;width:100%;max-width:420px;backdrop-filter:blur(8px)}
.auth-card-title{font-size:26px;font-weight:800;color:var(--text);letter-spacing:-0.5px;margin-bottom:6px}
.auth-card-sub{color:var(--text3);font-size:14px;margin-bottom:28px}
.nav-btn-ghost{padding:8px 18px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-weight:600;font-size:14px;cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif;white-space:nowrap;WebkitTapHighlightColor:transparent}
.nav-btn-ghost:hover{background:rgba(255,255,255,.06);color:var(--text);border-color:var(--border)}
.nav-btn-primary{padding:8px 18px;border-radius:10px;border:none;background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;font-weight:600;font-size:14px;cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif;box-shadow:0 4px 14px rgba(59,130,246,.3);white-space:nowrap;WebkitTapHighlightColor:transparent}
.nav-btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,.4)}
.nav-btn-success{padding:8px 18px;border-radius:10px;border:none;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-weight:600;font-size:14px;cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif;box-shadow:0 4px 14px rgba(34,197,94,.3);white-space:nowrap;WebkitTapHighlightColor:transparent}
.auth-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text3);font-size:13px}
.auth-divider::before,.auth-divider::after{content:"";flex:1;height:1px;background:var(--border)}
.auth-link{color:var(--blue);font-weight:600;cursor:pointer;text-decoration:none;transition:color .2s}
.auth-link:hover{color:#60a5fa}
.features-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:20px}
@media(max-width:480px){
  .auth-nav{padding:0 14px}
  .auth-nav-logo-text{font-size:16px}
  .auth-card{padding:24px 18px}
  .auth-card-title{font-size:22px}
  .nav-btn-ghost,.nav-btn-primary,.nav-btn-success{padding:7px 12px;font-size:13px}
  .features-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const SUPA_URL = "https://lyjhbzyykubeuvenmbjc.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5amhienl5a3ViZXV2ZW5tYmpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNDg0OTQsImV4cCI6MjA4ODgyNDQ5NH0.qOyZrI4GzJKPfw81kS4z22l9r8tt3mGNdMNVJHgCjmc";
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const fmt = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
const getGrade = (score,total) => { if(!total) return 1; const p=(score/total)*100; if(p>=86)return 5;if(p>=71)return 4;if(p>=56)return 3;if(p>=41)return 2;return 1; };
const gradeColor = g => ({5:"#22c55e",4:"#84cc16",3:"#eab308",2:"#f97316",1:"#ef4444"}[g]||"#94a3b8");
const LETTERS=["A","B","C","D"];
const LC={A:"#3b82f6",B:"#22c55e",C:"#f59e0b",D:"#ef4444"};

const Spinner = ({size=24,color="var(--blue)"}) => (
  <div style={{width:size,height:size,border:`2px solid transparent`,borderTopColor:color,borderRadius:"50%",flexShrink:0}} className="spin"/>
);

const Btn = ({children,onClick,variant="primary",size="md",disabled,full,style:sx={}}) => {
  const pad=size==="sm"?"7px 14px":size==="lg"?"14px 28px":"10px 18px";
  const fs=size==="sm"?"13px":size==="lg"?"16px":"14px";
  const V={
    primary:{background:"linear-gradient(135deg,#3b82f6,#2563eb)",color:"#fff",boxShadow:"0 4px 14px rgba(59,130,246,.3)"},
    success:{background:"linear-gradient(135deg,#22c55e,#16a34a)",color:"#fff",boxShadow:"0 4px 14px rgba(34,197,94,.3)"},
    danger: {background:"linear-gradient(135deg,#ef4444,#dc2626)",color:"#fff",boxShadow:"0 4px 14px rgba(239,68,68,.3)"},
    warning:{background:"linear-gradient(135deg,#f59e0b,#d97706)",color:"#fff",boxShadow:"0 4px 14px rgba(245,158,11,.3)"},
    purple: {background:"linear-gradient(135deg,#8b5cf6,#7c3aed)",color:"#fff",boxShadow:"0 4px 14px rgba(139,92,246,.3)"},
    ghost:  {background:"rgba(255,255,255,.05)",color:"#94a3b8",border:"1px solid rgba(255,255,255,.1)"},
    outline:{background:"transparent",color:"#3b82f6",border:"1px solid #3b82f6"},
  };
  return <button onClick={disabled?undefined:onClick} style={{border:"none",borderRadius:10,fontWeight:600,cursor:disabled?"not-allowed":"pointer",transition:"all .2s",opacity:disabled?.45:1,touchAction:"manipulation",padding:pad,fontSize:fs,WebkitTapHighlightColor:"transparent",userSelect:"none",width:full?"100%":"auto",...V[variant],...sx}}>{children}</button>;
};

const FormInput = ({label,error,...props}) => (
  <div style={{marginBottom:18}}>
    {label&&<label style={{display:"block",fontSize:13,color:"var(--text2)",marginBottom:7,fontWeight:600}}>{label}</label>}
    <input {...props} style={{width:"100%",padding:"13px 16px",background:"rgba(255,255,255,.05)",border:`1px solid ${error?"var(--red)":"rgba(255,255,255,.1)"}`,borderRadius:12,color:"var(--text)",fontSize:15,outline:"none",WebkitAppearance:"none",transition:"all .2s",...(props.style||{})}}
      onFocus={e=>{e.target.style.borderColor="var(--blue)";e.target.style.background="rgba(59,130,246,.05)";}}
      onBlur={e=>{e.target.style.borderColor=error?"var(--red)":"rgba(255,255,255,.1)";e.target.style.background="rgba(255,255,255,.05)";}}
    />
    {error&&<p style={{color:"var(--red)",fontSize:12,marginTop:5}}>⚠ {error}</p>}
  </div>
);

// Legacy Input for teacher/admin panels
const Input = ({label,error,...props}) => (
  <div style={{marginBottom:16}}>
    {label&&<label style={{display:"block",fontSize:12,color:"var(--text2)",marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:.5}}>{label}</label>}
    <input {...props} style={{width:"100%",padding:"12px 14px",background:"rgba(255,255,255,.04)",border:`1px solid ${error?"var(--red)":"var(--border2)"}`,borderRadius:10,color:"var(--text)",fontSize:15,outline:"none",WebkitAppearance:"none",transition:"border-color .2s",...(props.style||{})}} onFocus={e=>e.target.style.borderColor="var(--blue)"} onBlur={e=>e.target.style.borderColor=error?"var(--red)":"var(--border2)"}/>
    {error&&<p style={{color:"var(--red)",fontSize:12,marginTop:4}}>⚠ {error}</p>}
  </div>
);

const Card = ({children,style:sx={},className=""}) => (
  <div className={className} style={{background:"rgba(255,255,255,.03)",border:"1px solid var(--border)",borderRadius:16,padding:20,...sx}}>{children}</div>
);

const Badge = ({children,color="var(--blue)"}) => (
  <span style={{background:color+"22",color,border:`1px solid ${color}44`,borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:600}}>{children}</span>
);

const Alert = ({type="error",children}) => {
  const c=type==="error"?"var(--red)":type==="success"?"var(--green)":"var(--yellow)";
  return <div style={{background:c+"18",border:`1px solid ${c}44`,borderRadius:10,padding:"10px 14px",fontSize:13,color:c,marginBottom:14}}>{children}</div>;
};

const ConfirmModal = ({message,confirmText="Ha, o'chirish",danger=true,onConfirm,onCancel}) => (
  <div className="modal-bg" onClick={onCancel}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:40,marginBottom:12,textAlign:"center"}}>⚠️</div>
      <p style={{color:"var(--text)",fontSize:15,lineHeight:1.6,marginBottom:24,textAlign:"center",whiteSpace:"pre-line"}}>{message}</p>
      <div style={{display:"flex",gap:10,justifyContent:"center"}}>
        <Btn onClick={onCancel} variant="ghost">Bekor qilish</Btn>
        <Btn onClick={onConfirm} variant={danger?"danger":"success"}>{confirmText}</Btn>
      </div>
    </div>
  </div>
);

const LoadingPage = ({text="Yuklanmoqda..."}) => (
  <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,background:"var(--bg)"}}>
    <div style={{fontSize:40,animation:"float 2s ease-in-out infinite"}}>🎓</div>
    <Spinner size={36}/>
    <p style={{color:"var(--text2)",fontSize:14}}>{text}</p>
  </div>
);

// ── GALEREYA ─────────────────────────────────────────────────
const Gallery = ({images=[]}) => {
  const [idx,setIdx]=useState(0);
  const [open,setOpen]=useState(false);
  const imgs=images.filter(Boolean);
  if(!imgs.length) return null;
  const prev=e=>{e.stopPropagation();setIdx(i=>(i-1+imgs.length)%imgs.length);};
  const next=e=>{e.stopPropagation();setIdx(i=>(i+1)%imgs.length);};
  return (
    <>
      <div className="gallery-wrap">
        <img src={imgs[idx]} alt={`Rasm ${idx+1}`} className="gallery-img" onClick={()=>setOpen(true)}/>
        {imgs.length>1&&<><button className="gnav" onClick={prev} style={{left:8}}>&#8249;</button><button className="gnav" onClick={next} style={{right:8}}>&#8250;</button></>}
        <div style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,.6)",borderRadius:6,padding:"3px 8px",fontSize:11,color:"#fff",pointerEvents:"none"}}>🔍 Bosib kattalashtiring</div>
        {imgs.length>1&&(
          <div style={{display:"flex",gap:6,justifyContent:"center",padding:"8px 0",background:"rgba(0,0,0,.3)"}}>
            {imgs.map((_,i)=><button key={i} onClick={()=>setIdx(i)} style={{width:i===idx?18:7,height:7,borderRadius:4,border:"none",cursor:"pointer",background:i===idx?"var(--blue)":"rgba(255,255,255,.3)",transition:"all .2s"}}/>)}
          </div>
        )}
      </div>
      {open&&(
        <div className="lightbox" onClick={()=>setOpen(false)}>
          <button onClick={()=>setOpen(false)} style={{position:"absolute",top:14,right:14,width:40,height:40,borderRadius:"50%",background:"var(--red)",border:"none",color:"#fff",fontSize:22,cursor:"pointer",zIndex:999999,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
          {imgs.length>1&&<><button className="gnav" onClick={prev} style={{left:12,position:"absolute",width:46,height:46}}>&#8249;</button><button className="gnav" onClick={next} style={{right:12,position:"absolute",width:46,height:46}}>&#8250;</button></>}
          <img src={imgs[idx]} alt="katta" onClick={e=>e.stopPropagation()}/>
          {imgs.length>1&&(
            <div style={{position:"absolute",bottom:14,left:0,right:0,display:"flex",justifyContent:"center",gap:6}}>
              {imgs.map((_,i)=><button key={i} onClick={e=>{e.stopPropagation();setIdx(i);}} style={{width:i===idx?18:7,height:7,borderRadius:4,border:"none",cursor:"pointer",background:i===idx?"var(--blue)":"rgba(255,255,255,.4)",transition:"all .2s"}}/>)}
            </div>
          )}
        </div>
      )}
    </>
  );
};

// ── LOGIN SAHIFASI ────────────────────────────────────────────
const LoginPage = ({onSwitchToRegister}) => {
  const [form,setForm]=useState({email:"",password:""});
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const handleLogin = async () => {
    setErr("");
    if(!form.email||!form.password) return setErr("Email va parolni kiriting!");
    setLoading(true);
    const {error}=await sb.auth.signInWithPassword({email:form.email,password:form.password});
    if(error){
      if(error.message.includes("Invalid login")) setErr("Email yoki parol noto'g'ri!");
      else setErr(error.message);
    }
    setLoading(false);
  };

  return (
    <div className="auth-bg">
      {/* NAV */}
      <nav className="auth-nav">
        <div className="auth-nav-logo">
          <div className="auth-nav-logo-icon">🎓</div>
          <span className="auth-nav-logo-text">Testlyy</span>
        </div>
        <div className="auth-nav-links">
          <button className="nav-btn-ghost" style={{fontFamily:"'Outfit',sans-serif"}} disabled>Kirish</button>
          <button className="nav-btn-success" style={{fontFamily:"'Outfit',sans-serif"}} onClick={onSwitchToRegister}>Ro'yxatdan o'tish</button>
        </div>
      </nav>

      {/* BODY */}
      <div className="auth-body">
        <div className="auth-card fade">
          <div style={{textAlign:"center",marginBottom:28}}>
            <div style={{width:60,height:60,borderRadius:16,background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 14px",boxShadow:"0 8px 32px rgba(99,102,241,.3)",animation:"float 3s ease-in-out infinite"}}>🎓</div>
            <h1 className="auth-card-title">Xush kelibsiz!</h1>
            <p className="auth-card-sub">Hisobingizga kiring</p>
          </div>

          <FormInput
            label="📧 Email"
            type="email"
            value={form.email}
            onChange={e=>setForm(p=>({...p,email:e.target.value}))}
            placeholder="email@maktab.uz"
            autoCapitalize="none"
            autoComplete="email"
          />
          <FormInput
            label="🔒 Parol"
            type="password"
            value={form.password}
            onChange={e=>setForm(p=>({...p,password:e.target.value}))}
            placeholder="••••••••"
            autoComplete="current-password"
            onKeyDown={e=>e.key==="Enter"&&handleLogin()}
          />

          {err&&<Alert type="error">{err}</Alert>}

          <button
            onClick={loading?undefined:handleLogin}
            style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:loading?"rgba(59,130,246,.5)":"linear-gradient(135deg,#3b82f6,#2563eb)",color:"#fff",fontSize:16,fontWeight:700,cursor:loading?"not-allowed":"pointer",transition:"all .2s",boxShadow:"0 4px 18px rgba(59,130,246,.35)",display:"flex",alignItems:"center",justifyContent:"center",gap:8,fontFamily:"'Outfit',sans-serif",marginBottom:20}}
          >
            {loading?<><Spinner size={18} color="#fff"/>Kirilmoqda...</>:"Kirish →"}
          </button>

          <p style={{textAlign:"center",color:"var(--text3)",fontSize:14}}>
            Hisobingiz yo'qmi?{" "}
            <span className="auth-link" onClick={onSwitchToRegister}>Ro'yxatdan o'ting</span>
          </p>

          {/* Features */}
          <div style={{marginTop:28,paddingTop:24,borderTop:"1px solid var(--border)"}}>
            <p style={{color:"var(--text3)",fontSize:12,textAlign:"center",marginBottom:14,textTransform:"uppercase",letterSpacing:1}}>Platform imkoniyatlari</p>
            <div className="features-grid">
              {[["📝","Testlar","O'qituvchilar tomonidan"],["⏱","Timer","Vaqt cheklovi bilan"],["📊","Natijalar","Baho va tahlil"]].map(([ic,t,s])=>(
                <div key={t} style={{background:"rgba(255,255,255,.03)",borderRadius:10,padding:"12px 8px",textAlign:"center",border:"1px solid var(--border)"}}>
                  <div style={{fontSize:22,marginBottom:5}}>{ic}</div>
                  <div style={{fontSize:12,fontWeight:700,color:"var(--text2)"}}>{t}</div>
                  <div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>{s}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ── RO'YXATDAN O'TISH SAHIFASI ────────────────────────────────
const RegisterPage = ({onSwitchToLogin}) => {
  const [form,setForm]=useState({full_name:"",email:"",password:"",role:"student"});
  const [err,setErr]=useState("");
  const [success,setSuccess]=useState(false);
  const [loading,setLoading]=useState(false);

  const handleRegister = async () => {
    setErr("");
    if(!form.full_name.trim()||!form.email||!form.password) return setErr("Barcha maydonlarni to'ldiring!");
    if(form.password.length<6) return setErr("Parol kamida 6 ta belgi bo'lsin!");
    setLoading(true);
    const {data,error}=await sb.auth.signUp({
      email:form.email,
      password:form.password,
      options:{data:{full_name:form.full_name.trim(),role:form.role}}
    });
    if(error){setErr(error.message);setLoading(false);return;}

    // Agar session darhol kelsa (email confirmation off) — profil trigger yaratadi
    // Agar session kelmasa — foydalanuvchi login qilishi kerak
    if(data?.session){
      // Session bor — onAuthStateChange ishlaydi, loadProfile chaqiriladi
      // Hech narsa qilmaymiz, App o'zi boshqaradi
    } else {
      // Email confirmation bor yoki boshqa sabab
      setSuccess(true);
    }
    setLoading(false);
  };

  if(success) return (
    <div className="auth-bg">
      <nav className="auth-nav">
        <div className="auth-nav-logo"><div className="auth-nav-logo-icon">🎓</div><span className="auth-nav-logo-text">Testlyy</span></div>
        <div className="auth-nav-links">
          <button className="nav-btn-primary" style={{fontFamily:"'Outfit',sans-serif"}} onClick={onSwitchToLogin}>Kirish</button>
        </div>
      </nav>
      <div className="auth-body">
        <div className="auth-card fade" style={{textAlign:"center"}}>
          <div style={{fontSize:56,marginBottom:16}}>✅</div>
          <h2 style={{fontSize:22,fontWeight:800,color:"var(--text)",marginBottom:8}}>Muvaffaqiyatli!</h2>
          <p style={{color:"var(--text2)",fontSize:15,marginBottom:24,lineHeight:1.6}}>Ro'yxatdan o'tdingiz.<br/>Endi hisobingizga kiring.</p>
          <button onClick={onSwitchToLogin} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#3b82f6,#2563eb)",color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>Kirishga o'tish →</button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="auth-bg">
      {/* NAV */}
      <nav className="auth-nav">
        <div className="auth-nav-logo">
          <div className="auth-nav-logo-icon">🎓</div>
          <span className="auth-nav-logo-text">Testlyy</span>
        </div>
        <div className="auth-nav-links">
          <button className="nav-btn-ghost" style={{fontFamily:"'Outfit',sans-serif"}} onClick={onSwitchToLogin}>Kirish</button>
          <button className="nav-btn-success" style={{fontFamily:"'Outfit',sans-serif"}} disabled>Ro'yxatdan o'tish</button>
        </div>
      </nav>

      {/* BODY */}
      <div className="auth-body">
        <div className="auth-card fade">
          <div style={{textAlign:"center",marginBottom:28}}>
            <div style={{width:60,height:60,borderRadius:16,background:"linear-gradient(135deg,#22c55e,#16a34a)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 14px",boxShadow:"0 8px 32px rgba(34,197,94,.25)",animation:"float 3s ease-in-out infinite"}}>✨</div>
            <h1 className="auth-card-title">Hisob yaratish</h1>
            <p className="auth-card-sub">Platformaga qo'shiling</p>
          </div>

          <FormInput
            label="👤 To'liq ism"
            value={form.full_name}
            onChange={e=>setForm(p=>({...p,full_name:e.target.value}))}
            placeholder="Abdullayev Jasur"
            autoComplete="name"
          />

          {/* Rol tanlash */}
          <div style={{marginBottom:18}}>
            <label style={{display:"block",fontSize:13,color:"var(--text2)",marginBottom:7,fontWeight:600}}>🎭 Rol</label>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {[{v:"student",icon:"👨‍🎓",label:"O'quvchi",desc:"Testlarni ishlash"},{v:"teacher",icon:"👨‍🏫",label:"O'qituvchi",desc:"Test yaratish"}].map(r=>(
                <div key={r.v} onClick={()=>setForm(p=>({...p,role:r.v}))} style={{padding:"14px 10px",borderRadius:12,border:`2px solid ${form.role===r.v?"var(--blue)":"rgba(255,255,255,.08)"}`,cursor:"pointer",textAlign:"center",transition:"all .2s",background:form.role===r.v?"rgba(59,130,246,.08)":"rgba(255,255,255,.02)"}}>
                  <div style={{fontSize:24,marginBottom:5}}>{r.icon}</div>
                  <div style={{fontSize:13,fontWeight:700,color:form.role===r.v?"var(--blue)":"var(--text)"}}>{r.label}</div>
                  <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{r.desc}</div>
                </div>
              ))}
            </div>
          </div>

          <FormInput
            label="📧 Email"
            type="email"
            value={form.email}
            onChange={e=>setForm(p=>({...p,email:e.target.value}))}
            placeholder="email@maktab.uz"
            autoCapitalize="none"
            autoComplete="email"
          />
          <FormInput
            label="🔒 Parol"
            type="password"
            value={form.password}
            onChange={e=>setForm(p=>({...p,password:e.target.value}))}
            placeholder="Kamida 6 ta belgi"
            autoComplete="new-password"
            onKeyDown={e=>e.key==="Enter"&&handleRegister()}
          />

          {err&&<Alert type="error">{err}</Alert>}

          <button
            onClick={loading?undefined:handleRegister}
            style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:loading?"rgba(34,197,94,.5)":"linear-gradient(135deg,#22c55e,#16a34a)",color:"#fff",fontSize:16,fontWeight:700,cursor:loading?"not-allowed":"pointer",transition:"all .2s",boxShadow:"0 4px 18px rgba(34,197,94,.3)",display:"flex",alignItems:"center",justifyContent:"center",gap:8,fontFamily:"'Outfit',sans-serif",marginBottom:20}}
          >
            {loading?<><Spinner size={18} color="#fff"/>Yaratilmoqda...</>:"Hisob yaratish →"}
          </button>

          <p style={{textAlign:"center",color:"var(--text3)",fontSize:14}}>
            Hisobingiz bormi?{" "}
            <span className="auth-link" onClick={onSwitchToLogin}>Kiring</span>
          </p>
        </div>
      </div>
    </div>
  );
};

// ── AUTH ROUTER (login/register sahifalari) ───────────────────
const AuthPages = () => {
  const [page,setPage]=useState("login");
  if(page==="login") return <LoginPage onSwitchToRegister={()=>setPage("register")}/>;
  return <RegisterPage onSwitchToLogin={()=>setPage("login")}/>;
};

// ── JAVOB TANLASH ─────────────────────────────────────────────
const AnswerPicker = ({value,onChange,size="md"}) => {
  const w=size==="lg"?58:44;
  return (
    <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
      {LETTERS.map(l=>{
        const sel=value===l;
        return <button key={l} onClick={()=>onChange(l)} style={{width:w,height:w,borderRadius:12,border:`2px solid ${sel?LC[l]:"rgba(255,255,255,.12)"}`,fontWeight:800,fontSize:size==="lg"?18:15,cursor:"pointer",transition:"all .15s",background:sel?LC[l]:"rgba(255,255,255,.05)",color:sel?"#fff":"#94a3b8",boxShadow:sel?`0 4px 20px ${LC[l]}55`:"none",transform:sel?"scale(1.12)":"scale(1)",touchAction:"manipulation",WebkitTapHighlightColor:"transparent"}}>{l}</button>;
      })}
    </div>
  );
};

// ── JAVOBLAR KALITI ───────────────────────────────────────────
const AnswerKeyGrid = ({answerKey,setAnswerKey,qCount}) => {
  const filled=Object.keys(answerKey).length;
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <p style={{color:"var(--text2)",fontSize:12,fontWeight:700,textTransform:"uppercase"}}>Javoblar kaliti</p>
        <span style={{color:filled===qCount?"var(--green)":"var(--yellow)",fontSize:13,fontWeight:700}}>{filled}/{qCount}{filled===qCount?" ✅":""}</span>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{color:"var(--text3)",fontSize:12}}>Barchasi:</span>
        {LETTERS.map(l=><button key={l} onClick={()=>{const k={};for(let i=1;i<=qCount;i++)k[i]=l;setAnswerKey(k);}} style={{padding:"4px 12px",borderRadius:6,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:LC[l]+"22",color:LC[l]}}>{l}</button>)}
        <button onClick={()=>setAnswerKey({})} style={{padding:"4px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:12,background:"rgba(255,255,255,.05)",color:"var(--text3)"}}>Tozalash</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(88px,1fr))",gap:5}}>
        {Array.from({length:qCount},(_,i)=>i+1).map(n=>{
          const val=answerKey[n];const vc=val?LC[val]:null;
          return (
            <div key={n} style={{background:val?vc+"11":"rgba(255,255,255,.02)",borderRadius:8,padding:"7px 3px",border:`1px solid ${val?vc+"33":"rgba(255,255,255,.05)"}`,textAlign:"center"}}>
              <div style={{color:val?vc:"var(--text3)",fontSize:10,marginBottom:4,fontWeight:700}}>#{n}</div>
              <div style={{display:"flex",gap:2,justifyContent:"center"}}>
                {LETTERS.map(l=>{const sel=val===l;const c=LC[l];return <button key={l} onClick={()=>setAnswerKey(p=>({...p,[n]:l}))} style={{width:20,height:20,borderRadius:4,border:sel?`1px solid ${c}`:"none",fontWeight:800,fontSize:9,cursor:"pointer",background:sel?c:"rgba(255,255,255,.06)",color:sel?"#fff":"#475569"}}>{l}</button>;})}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ── O'QITUVCHI PANELI ─────────────────────────────────────────
const TeacherPanel = ({profile,onLogout}) => {
  const [tab,setTab]=useState("tests");
  const [tests,setTests]=useState([]);
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(true);
  const [syncing,setSyncing]=useState(false);
  const [confirm,setConfirm]=useState(null);
  const [building,setBuilding]=useState(false);
  const [title,setTitle]=useState("");
  const [timeLimit,setTimeLimit]=useState(20);
  const [qCount,setQCount]=useState(10);
  const [answerKey,setAnswerKey]=useState({});
  const [imgFiles,setImgFiles]=useState([]);
  const [imgPreviews,setImgPreviews]=useState([]);
  const [saving,setSaving]=useState(false);
  const fileRef=useRef();

  const loadData=useCallback(async()=>{
    setLoading(true);
    const {data:t}=await sb.from("tests").select("*").eq("teacher_id",profile.id).order("created_at",{ascending:false});
    const ids=(t||[]).map(x=>x.id);
    const {data:r}=ids.length?await sb.from("results").select("*,profiles(full_name)").in("test_id",ids):{data:[]};
    setTests(t||[]);setResults(r||[]);setLoading(false);
  },[profile.id]);

  useEffect(()=>{loadData();},[loadData]);

  const handleQCount=v=>{
    const n=Math.min(100,Math.max(1,v));setQCount(n);
    setAnswerKey(p=>{const nx={};for(let i=1;i<=n;i++)if(p[i])nx[i]=p[i];return nx;});
  };

  const handleImgPick=e=>{
    const files=Array.from(e.target.files||[]);
    files.slice(0,5-imgFiles.length).forEach(f=>{
      if(f.size>5*1024*1024){alert(f.name+" — 5MB dan kichik bo'lsin!");return;}
      const r=new FileReader();
      r.onload=ev=>{setImgPreviews(p=>[...p,ev.target.result]);setImgFiles(p=>[...p,f]);};
      r.readAsDataURL(f);
    });
    e.target.value="";
  };

  const removeImg=i=>{setImgFiles(p=>p.filter((_,j)=>j!==i));setImgPreviews(p=>p.filter((_,j)=>j!==i));};

  const handleSave=async()=>{
    if(!title.trim()) return alert("Test nomini kiriting!");
    const missing=[];for(let i=1;i<=qCount;i++)if(!answerKey[i])missing.push(i);
    if(missing.length) return alert("Javobsiz savollar: "+missing.slice(0,10).join(", ")+(missing.length>10?"...":""));
    setSaving(true);
    const image_urls=[];
    for(const file of imgFiles){
      const ext=file.name.split(".").pop();
      const path=`${profile.id}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      const {error}=await sb.storage.from("test-images").upload(path,file);
      if(!error){const {data:p}=sb.storage.from("test-images").getPublicUrl(path);image_urls.push(p.publicUrl);}
    }
    const {error}=await sb.from("tests").insert({title,teacher_id:profile.id,time_limit:timeLimit,question_count:qCount,answer_key:answerKey,image_urls:image_urls.length?image_urls:null,active:false});
    if(error) alert("Xato: "+error.message);
    else{setTitle("");setTimeLimit(20);setQCount(10);setAnswerKey({});setImgFiles([]);setImgPreviews([]);setBuilding(false);await loadData();setTab("manage");}
    setSaving(false);
  };

  const toggleActive=async t=>{setSyncing(true);await sb.from("tests").update({active:!t.active}).eq("id",t.id);await loadData();setSyncing(false);};
  const deleteTest=async id=>{await sb.from("tests").delete().eq("id",id);setConfirm(null);await loadData();};
  const grantRetry=async id=>{await sb.from("results").update({can_retry:true}).eq("id",id);await loadData();};

  const TABS=[{id:"tests",icon:"📝",label:"Testlar"},{id:"manage",icon:"⚙️",label:"Boshqarish"},{id:"results",icon:"📊",label:"Natijalar"}];
  if(loading) return <LoadingPage/>;

  return (
    <div style={{minHeight:"100vh",background:"var(--bg)",paddingBottom:72}}>
      {confirm&&<ConfirmModal message={`"${confirm.title}" testini o'chirasizmi?\nBarcha natijalar ham o'chadi!`} onConfirm={()=>deleteTest(confirm.id)} onCancel={()=>setConfirm(null)}/>}
      {syncing&&<div style={{position:"fixed",top:0,left:0,right:0,zIndex:9999,height:3,background:"linear-gradient(90deg,var(--blue),var(--purple),var(--blue))",backgroundSize:"200% 100%",animation:"shimmer 1.5s infinite"}}/>}
      <div style={{background:"rgba(255,255,255,.02)",borderBottom:"1px solid var(--border)",padding:"0 16px",height:52,position:"sticky",top:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:20}}>🎓</span>
          <span style={{fontWeight:800,fontSize:16,color:"var(--text)"}}>Testlyy</span>
          <Badge color="var(--blue)">O'qituvchi</Badge>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:12,color:"var(--text3)",maxWidth:100,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{profile.full_name}</span>
          <Btn onClick={onLogout} variant="ghost" size="sm">↩ Chiqish</Btn>
        </div>
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"rgba(10,15,30,.98)",backdropFilter:"blur(20px)",borderTop:"1px solid var(--border)",display:"flex",height:62}}>
        {TABS.map(t=>{const act=tab===t.id;return(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,border:"none",cursor:"pointer",background:"transparent",WebkitTapHighlightColor:"transparent",color:act?"var(--blue)":"var(--text3)",position:"relative",transition:"color .2s"}}>
            {act&&<div style={{position:"absolute",top:0,left:"25%",right:"25%",height:2,background:"var(--blue)",borderRadius:"0 0 3px 3px"}}/>}
            <span style={{fontSize:20,lineHeight:1}}>{t.icon}</span>
            <span style={{fontSize:11,fontWeight:act?700:400}}>{t.label}</span>
          </button>
        );})}
      </div>
      <div style={{maxWidth:960,margin:"0 auto",padding:"16px 14px 24px"}}>
        {tab==="tests"&&(
          <div className="fade">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h2 style={{fontSize:20,fontWeight:800,color:"var(--text)"}}>Testlar</h2>
              {!building&&<Btn onClick={()=>setBuilding(true)} variant="success">+ Yangi test</Btn>}
            </div>
            {building&&(
              <Card style={{marginBottom:20}}>
                <h3 style={{color:"var(--text)",fontWeight:700,fontSize:17,marginBottom:20}}>📋 Yangi test</h3>
                <Input label="Test nomi" value={title} onChange={e=>setTitle(e.target.value)} placeholder="Matematika 9-A variant-1"/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
                  {[{lbl:"⏱ Vaqt (daqiqa)",val:timeLimit,min:5,max:180,step:5,set:v=>setTimeLimit(v)},
                    {lbl:"📋 Savollar soni",val:qCount,min:1,max:100,step:1,set:handleQCount}].map(f=>(
                    <div key={f.lbl} style={{background:"rgba(255,255,255,.03)",borderRadius:12,padding:"12px"}}>
                      <label style={{display:"block",fontSize:11,color:"var(--text2)",marginBottom:8,fontWeight:700,textTransform:"uppercase"}}>{f.lbl}</label>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <button onClick={()=>f.set(Math.max(f.min,f.val-f.step))} style={{width:34,height:34,borderRadius:8,border:"1px solid var(--border2)",background:"rgba(255,255,255,.05)",color:"var(--text2)",fontWeight:700,cursor:"pointer",fontSize:16,flexShrink:0}}>−</button>
                        <span style={{color:"var(--text)",fontWeight:800,flex:1,textAlign:"center",fontSize:17}}>{f.val}</span>
                        <button onClick={()=>f.set(Math.min(f.max,f.val+f.step))} style={{width:34,height:34,borderRadius:8,border:"1px solid var(--border2)",background:"rgba(255,255,255,.05)",color:"var(--text2)",fontWeight:700,cursor:"pointer",fontSize:16,flexShrink:0}}>+</button>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{marginBottom:16}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <label style={{fontSize:12,color:"var(--text2)",fontWeight:700,textTransform:"uppercase"}}>🖼 Rasmlar (max 5 ta)</label>
                    <span style={{fontSize:12,color:imgFiles.length>=5?"var(--red)":"var(--text3)"}}>{imgFiles.length}/5</span>
                  </div>
                  <input ref={fileRef} type="file" accept="image/*" multiple onChange={handleImgPick} style={{display:"none"}}/>
                  {imgPreviews.length>0&&(
                    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
                      {imgPreviews.map((src,i)=>(
                        <div key={i} style={{position:"relative",width:80,height:80}}>
                          <img src={src} style={{width:80,height:80,objectFit:"cover",borderRadius:8,border:"1px solid var(--border2)"}}/>
                          <button onClick={()=>removeImg(i)} style={{position:"absolute",top:-6,right:-6,width:22,height:22,borderRadius:"50%",background:"var(--red)",border:"none",color:"#fff",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                        </div>
                      ))}
                    </div>
                  )}
                  {imgFiles.length<5&&(
                    <div onClick={()=>fileRef.current?.click()} style={{border:"2px dashed var(--border2)",borderRadius:10,padding:"16px",textAlign:"center",cursor:"pointer",background:"rgba(255,255,255,.02)"}}>
                      <div style={{fontSize:24,marginBottom:4}}>📷</div>
                      <p style={{color:"var(--text3)",fontSize:13}}>Rasm qo'shish (PNG/JPG, 5MB gacha)</p>
                    </div>
                  )}
                </div>
                <div style={{background:"rgba(0,0,0,.2)",borderRadius:12,padding:14,marginBottom:20,border:"1px solid rgba(255,255,255,.05)"}}>
                  <AnswerKeyGrid answerKey={answerKey} setAnswerKey={setAnswerKey} qCount={qCount}/>
                </div>
                <div style={{display:"flex",gap:10}}>
                  <Btn onClick={handleSave} variant="success" disabled={saving}>{saving?<Spinner size={16} color="#fff"/>:"💾 Saqlash"}</Btn>
                  <Btn onClick={()=>{setTitle("");setTimeLimit(20);setQCount(10);setAnswerKey({});setImgFiles([]);setImgPreviews([]);setBuilding(false);}} variant="ghost">Bekor</Btn>
                </div>
              </Card>
            )}
            {!tests.length&&!building&&<Card style={{textAlign:"center",padding:48}}><div style={{fontSize:48,marginBottom:12}}>📋</div><p style={{color:"var(--text3)"}}>Hali test yaratilmagan</p></Card>}
            {tests.map(t=>{
              const raw=t.image_urls;const imgs=Array.isArray(raw)?raw:(raw?JSON.parse(raw):[]);
              return (
                <Card key={t.id} style={{marginBottom:10}}>
                  <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:10}}>
                    {imgs[0]&&<img src={imgs[0]} style={{width:52,height:52,objectFit:"cover",borderRadius:8,flexShrink:0,border:"1px solid var(--border)"}}/>}
                    <div style={{minWidth:0,flex:1}}>
                      <div style={{color:"var(--text)",fontWeight:700,fontSize:14,marginBottom:5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                        <Badge color={t.active?"var(--green)":"var(--text3)"}>{t.active?"Faol":"Nofaol"}</Badge>
                        <span style={{color:"var(--text3)",fontSize:12}}>{t.question_count} savol · {t.time_limit} min</span>
                        {imgs.length>1&&<span style={{color:"var(--yellow)",fontSize:12}}>🖼 {imgs.length} rasm</span>}
                      </div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>toggleActive(t)} style={{flex:1,padding:"9px 8px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,color:"#fff",WebkitTapHighlightColor:"transparent",background:t.active?"linear-gradient(135deg,#f59e0b,#d97706)":"linear-gradient(135deg,#22c55e,#16a34a)"}}>{t.active?"⏸ To'xtatish":"▶ Faollashtirish"}</button>
                    <button onClick={()=>setConfirm({id:t.id,title:t.title})} style={{padding:"9px 14px",borderRadius:10,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#ef4444,#dc2626)",color:"#fff"}}>🗑</button>
                  </div>
                </Card>
              );
            })}
          </div>
        )}
        {tab==="manage"&&(
          <div className="fade">
            <h2 style={{fontSize:20,fontWeight:800,color:"var(--text)",marginBottom:20}}>Test boshqarish</h2>
            {!tests.length&&<Card style={{textAlign:"center",padding:48}}><p style={{color:"var(--text3)"}}>Avval test yarating</p></Card>}
            {tests.map(test=>{
              const testResults=results.filter(r=>r.test_id===test.id);
              return (
                <Card key={test.id} style={{marginBottom:16}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,marginBottom:12}}>
                    <div style={{minWidth:0}}>
                      <h3 style={{color:"var(--text)",fontWeight:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{test.title}</h3>
                      <div style={{display:"flex",gap:6,marginTop:4}}>
                        <Badge color={test.active?"var(--green)":"var(--text3)"}>{test.active?"Faol":"Nofaol"}</Badge>
                        <span style={{color:"var(--text3)",fontSize:12}}>{test.question_count} savol</span>
                      </div>
                    </div>
                    <Badge color="var(--blue)">{testResults.length} natija</Badge>
                  </div>
                  {!testResults.length?<p style={{color:"var(--text3)",fontSize:13}}>Hali hech kim topshirmagan</p>
                  :testResults.map(r=>{
                    const g=getGrade(r.score,r.total);
                    const has2=testResults.some(x=>x.student_id===r.student_id&&x.attempt_number===2);
                    return (
                      <div key={r.id} style={{background:"rgba(255,255,255,.03)",borderRadius:10,padding:"10px 12px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                        <div>
                          <span style={{color:"var(--text)",fontWeight:600,fontSize:14}}>{r.profiles?.full_name||"Noma'lum"}</span>
                          <span style={{color:"var(--text3)",fontSize:12,marginLeft:8}}>{r.attempt_number}-urinish</span>
                        </div>
                        <div style={{display:"flex",gap:6,alignItems:"center"}}>
                          <span style={{background:gradeColor(g)+"22",color:gradeColor(g),border:`1px solid ${gradeColor(g)}44`,borderRadius:8,padding:"2px 10px",fontWeight:800}}>{g}</span>

// ── O'QUVCHI ENTRY ────────────────────────────────────────────
const StudentEntry = ({profile,onStart,onLogout}) => {
  const [tests,setTests]=useState([]);
  const [myResults,setMyRes]=useState([]);
  const [selId,setSelId]=useState("");
  const [loading,setLoading]=useState(true);
  const [err,setErr]=useState("");

  useEffect(()=>{
    const load=async()=>{
      const {data:t}=await sb.from("tests").select("*").eq("active",true).order("created_at",{ascending:false});
      const {data:r}=await sb.from("results").select("*").eq("student_id",profile.id);
      setTests(t||[]);setMyRes(r||[]);setLoading(false);
    };
    load();
  },[profile.id]);

  const go=()=>{
    setErr("");
    if(!selId) return setErr("Test tanlang!");
    const test=tests.find(t=>t.id===selId);
    if(!test) return setErr("Test topilmadi!");
    const done=myResults.filter(r=>r.test_id===test.id);
    if(done.length>=2) return setErr("Siz bu testni 2 marta ishladingiz!");
    if(done.length===1&&!done[0].can_retry) return setErr("2-urinish uchun o'qituvchingizdan ruxsat oling!");
    onStart({test,attemptNumber:done.length+1});
  };

  if(loading) return <LoadingPage text="Testlar yuklanmoqda..."/>;
  return (
    <div className="fade" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"radial-gradient(ellipse at 20% 80%,rgba(34,197,94,.08) 0%,transparent 50%),var(--bg)"}}>
      <Card style={{width:"100%",maxWidth:440,padding:28}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <div><div style={{fontSize:24,marginBottom:4}}>👨‍🎓</div><h2 style={{fontSize:18,fontWeight:800,color:"var(--text)"}}>Salom, {profile.full_name.split(" ")[0]}!</h2></div>
          <Btn onClick={onLogout} variant="ghost" size="sm">↩ Chiqish</Btn>
        </div>
        <div style={{marginBottom:16}}>
          <label style={{display:"block",fontSize:12,color:"var(--text2)",marginBottom:8,fontWeight:700,textTransform:"uppercase"}}>Test tanlang</label>
          <select value={selId} onChange={e=>setSelId(e.target.value)} style={{width:"100%",padding:"12px 14px",background:"rgba(255,255,255,.04)",border:"1px solid var(--border2)",borderRadius:10,color:"var(--text)",fontSize:15,outline:"none"}}>
            <option value="">-- Test tanlang --</option>
            {tests.map(t=>{
              const done=myResults.filter(r=>r.test_id===t.id);
              const blocked=done.length===1&&!done[0].can_retry;
              return <option key={t.id} value={t.id} style={{background:"#1e293b"}}>{blocked?"🔒":"✅"} {t.title} ({t.question_count} savol){done.length>0?` [${done.length}/2]`:""}</option>;
            })}
          </select>
          {!tests.length&&<p style={{color:"var(--yellow)",fontSize:12,marginTop:6}}>⚠ Hozircha faol test yo'q</p>}
        </div>
        {err&&<Alert type="error">{err}</Alert>}
        <Btn onClick={go} variant="success" full size="lg">Testni boshlash ▶</Btn>
        {myResults.length>0&&(
          <div style={{marginTop:20}}>
            <p style={{color:"var(--text2)",fontSize:12,fontWeight:700,textTransform:"uppercase",marginBottom:10}}>Mening natijalarim</p>
            {myResults.slice().reverse().map(r=>{
              const g=getGrade(r.score,r.total);const t=tests.find(x=>x.id===r.test_id);
              return (
                <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,255,255,.03)",borderRadius:10,padding:"10px 12px",marginBottom:6}}>
                  <div>
                    <div style={{color:"var(--text)",fontSize:13,fontWeight:600}}>{t?.title||"Test"}</div>
                    <div style={{color:"var(--text3)",fontSize:11}}>{r.attempt_number}-urinish</div>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{color:"var(--text2)",fontSize:13}}>{r.score}/{r.total}</span>
                    <span style={{background:gradeColor(g)+"22",color:gradeColor(g),border:`1px solid ${gradeColor(g)}44`,borderRadius:8,padding:"2px 10px",fontWeight:800}}>{g}</span>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </Card>
    </div>
  );
};

// ── TEST SAHIFASI ─────────────────────────────────────────────
const TestPage = ({profile,test,attemptNumber,onFinish}) => {
  const [answers,setAnswers]=useState({});
  const [currentQ,setCurrentQ]=useState(1);
  const [timeLeft,setTimeLeft]=useState(test.time_limit*60);
  const [showConfirm,setShowConfirm]=useState(false);
  const [isMobile,setIsMobile]=useState(window.innerWidth<768);
  const answersRef=useRef({});
  const finishedRef=useRef(false);
  const startRef=useRef(Date.now());

  useEffect(()=>{const c=()=>setIsMobile(window.innerWidth<768);window.addEventListener("resize",c);return()=>window.removeEventListener("resize",c);},[]);
  const pick=(q,l)=>{const n={...answersRef.current,[q]:l};answersRef.current=n;setAnswers({...n});};

  const doFinish=useCallback(()=>{
    if(finishedRef.current) return;finishedRef.current=true;
    const timeTaken=Math.floor((Date.now()-startRef.current)/1000);
    const ans=answersRef.current;let score=0;
    for(let i=1;i<=test.question_count;i++)if(ans[i]&&test.answer_key[i]&&ans[i]===test.answer_key[i])score++;
    onFinish({answers:{...ans},score,timeTaken,attemptNumber});
  },[test,onFinish,attemptNumber]);

  useEffect(()=>{
    const t=setInterval(()=>setTimeLeft(p=>{if(p<=1){clearInterval(t);setTimeout(doFinish,100);return 0;}return p-1;}),1000);
    return()=>clearInterval(t);
  },[doFinish]);

  const urgent=timeLeft<=60;
  const rawImgs=test.image_urls;
  const imgs=Array.isArray(rawImgs)?rawImgs:(typeof rawImgs==="string"?JSON.parse(rawImgs||"[]"):[]);
  const answered=Object.keys(answers).length;

  const QuestionNav=()=>(
    <Card style={{padding:14,marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <p style={{fontSize:11,color:"var(--text2)",fontWeight:700,textTransform:"uppercase"}}>Savollar</p>
        <span style={{fontSize:12,color:answered===test.question_count?"var(--green)":"var(--yellow)",fontWeight:700}}>{answered}/{test.question_count}{answered===test.question_count?" ✅":""}</span>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
        {Array.from({length:test.question_count},(_,i)=>i+1).map(n=>{
          const a=answers[n];const cur=n===currentQ;
          return <button key={n} onClick={()=>setCurrentQ(n)} style={{width:32,height:32,borderRadius:7,border:cur?"2px solid var(--blue)":"1px solid rgba(255,255,255,.1)",cursor:"pointer",fontWeight:700,fontSize:11,transition:"all .12s",background:cur?"var(--blue)":a?LC[a]+"22":"rgba(255,255,255,.04)",color:cur?"#fff":a?LC[a]:"var(--text3)",WebkitTapHighlightColor:"transparent"}}>{a||n}</button>;
        })}
      </div>
    </Card>
  );

  const AnswerCard=()=>(
    <Card style={{padding:20,marginBottom:14}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
        <div style={{width:44,height:44,borderRadius:12,background:"linear-gradient(135deg,var(--blue),var(--purple))",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:18,flexShrink:0}}>{currentQ}</div>
        <div><p style={{color:"var(--text)",fontWeight:700,fontSize:16}}>{currentQ}-savol javobi</p><p style={{color:"var(--text3)",fontSize:12}}>To'g'ri javob harfini tanlang</p></div>
      </div>
      <AnswerPicker size="lg" value={answers[currentQ]||null} onChange={l=>pick(currentQ,l)}/>
      {answers[currentQ]&&<div style={{marginTop:14,padding:"10px 14px",background:"rgba(34,197,94,.08)",border:"1px solid rgba(34,197,94,.2)",borderRadius:10}}><span style={{color:"var(--green)",fontSize:14,fontWeight:600}}>✓ {currentQ}-savol: <strong>{answers[currentQ]}</strong></span></div>}
    </Card>
  );

  const NavBtns=()=>(
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
      <Btn onClick={()=>setCurrentQ(n=>Math.max(1,n-1))} variant="ghost" disabled={currentQ===1} size="sm">← Oldingi</Btn>
      <span style={{color:"var(--text3)",fontSize:13,fontFamily:"'JetBrains Mono',monospace"}}>{currentQ}/{test.question_count}</span>
      {currentQ<test.question_count?<Btn onClick={()=>setCurrentQ(n=>n+1)} variant="primary" size="sm">Keyingi →</Btn>:<Btn onClick={()=>setShowConfirm(true)} variant="success" size="sm">✅ Tugatish</Btn>}
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column"}}>
      {showConfirm&&<ConfirmModal message={`${test.question_count-answered>0?"⚠ "+(test.question_count-answered)+" ta savol javobsiz!\n\n":""}Testni tugatmoqchimisiz?`} confirmText="Ha, tugatish" danger={false} onConfirm={()=>{setShowConfirm(false);doFinish();}} onCancel={()=>setShowConfirm(false)}/>}
      <div style={{background:"rgba(10,15,30,.97)",backdropFilter:"blur(12px)",borderBottom:"1px solid var(--border)",padding:"0 12px",display:"flex",alignItems:"center",justifyContent:"space-between",height:56,position:"sticky",top:0,zIndex:100,gap:8}}>
        <div style={{minWidth:0}}>
          <div style={{color:"var(--text)",fontWeight:700,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{test.title}</div>
          <div style={{color:"var(--text3)",fontSize:11}}>{profile.full_name}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,padding:"7px 12px",background:urgent?"rgba(239,68,68,.12)":"rgba(59,130,246,.1)",border:`1px solid ${urgent?"rgba(239,68,68,.35)":"rgba(59,130,246,.3)"}`,borderRadius:10,animation:urgent?"pulse 1s infinite":"none"}}>
            <span style={{fontSize:13}}>⏱</span>
            <span style={{fontSize:18,fontWeight:800,color:urgent?"var(--red)":"var(--blue)",fontFamily:"'JetBrains Mono',monospace"}}>{fmt(timeLeft)}</span>
          </div>
          <Btn onClick={()=>setShowConfirm(true)} variant="danger" size="sm">Tugatish</Btn>
        </div>
      </div>
      <div style={{height:3,background:"rgba(255,255,255,.05)"}}>
        <div style={{height:"100%",background:urgent?"var(--red)":"linear-gradient(90deg,var(--blue),var(--purple))",width:`${(timeLeft/(test.time_limit*60))*100}%`,transition:"width 1s linear"}}/>
      </div>
      <div style={{display:"flex",gap:8,padding:"12px 12px 0",maxWidth:960,margin:"0 auto",width:"100%"}}>
        {[{v:answered,c:"var(--green)",bg:"rgba(34,197,94,.08)",l:"Javob"},{v:test.question_count-answered,c:"var(--red)",bg:"rgba(239,68,68,.06)",l:"Qoldi"},{v:test.question_count,c:"var(--blue)",bg:"rgba(59,130,246,.08)",l:"Jami"}].map(s=>(
          <div key={s.l} style={{flex:1,background:s.bg,borderRadius:10,padding:"8px 4px",textAlign:"center",border:`1px solid ${s.c}22`}}>
            <div style={{color:s.c,fontWeight:800,fontSize:20,lineHeight:1}}>{s.v}</div>
            <div style={{color:"var(--text3)",fontSize:11,marginTop:2}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px 12px 32px",WebkitOverflowScrolling:"touch"}}>
        <div style={{maxWidth:960,margin:"0 auto"}}>
          {!isMobile&&imgs.length?(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,alignItems:"start"}}>
              <div style={{position:"sticky",top:68}}><Gallery images={imgs}/></div>
              <div><QuestionNav/><AnswerCard/><NavBtns/></div>
            </div>
          ):(
            <>{imgs.length>0&&<Gallery images={imgs}/>}<QuestionNav/><AnswerCard/><NavBtns/></>
          )}
        </div>
      </div>
    </div>
  );
};

            <h2 style={{fontSize:20,fontWeight:800,color:"var(--text)",marginBottom:20}}>Boshqaruv paneli</h2>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:12}}>
              {[{icon:"👨‍🏫",label:"O'qituvchilar",value:teachers.length,color:"var(--blue)"},{icon:"👨‍🎓",label:"O'quvchilar",value:students.length,color:"var(--green)"},{icon:"📋",label:"Jami testlar",value:tests.length,color:"var(--purple)"},{icon:"✅",label:"Faol testlar",value:tests.filter(t=>t.active).length,color:"var(--yellow)"}].map(s=>(
                <Card key={s.label} style={{textAlign:"center",padding:"20px 12px"}}>
                  <div style={{fontSize:28,marginBottom:8}}>{s.icon}</div>
                  <div style={{fontSize:26,fontWeight:800,color:s.color}}>{s.value}</div>
                  <div style={{fontSize:12,color:"var(--text3)",marginTop:4}}>{s.label}</div>
                </Card>
              ))}
            </div>
          </div>
        )}
        {tab==="users"&&(
          <div className="fade">
            <h2 style={{fontSize:20,fontWeight:800,color:"var(--text)",marginBottom:16}}>Foydalanuvchilar</h2>
            <div style={{display:"flex",background:"rgba(0,0,0,.3)",borderRadius:10,padding:3,marginBottom:20,maxWidth:360}}>
              {[["teachers","👨‍🏫 O'qituvchilar",teachers.length],["students","👨‍🎓 O'quvchilar",students.length]].map(([k,v,cnt])=>(
                <button key={k} onClick={()=>setUserTab(k)} style={{flex:1,padding:"9px 0",borderRadius:8,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,transition:"all .2s",WebkitTapHighlightColor:"transparent",background:userTab===k?"linear-gradient(135deg,#8b5cf6,#7c3aed)":"transparent",color:userTab===k?"#fff":"var(--text3)"}}>{v} ({cnt})</button>
              ))}
            </div>
            <Card>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",minWidth:340}}>
                  <thead><tr style={{borderBottom:"1px solid var(--border)"}}>{["#","To'liq ism","Email","Qo'shilgan"].map(h=><th key={h} style={{padding:"8px 10px",color:"var(--text3)",fontSize:12,fontWeight:600,textAlign:"left",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
                  <tbody>
                    {(userTab==="teachers"?teachers:students).map((u,i)=>(
                      <tr key={u.id} style={{borderBottom:"1px solid rgba(255,255,255,.04)"}}>
                        <td style={{padding:"10px 10px",color:"var(--text3)",fontSize:13}}>{i+1}</td>
                        <td style={{padding:"10px 10px",color:"var(--text)",fontWeight:600,fontSize:14}}>{u.full_name}</td>
                        <td style={{padding:"10px 10px",color:"var(--blue)",fontSize:13,fontFamily:"'JetBrains Mono',monospace"}}>{u.email||"—"}</td>
                        <td style={{padding:"10px 10px",color:"var(--text3)",fontSize:12}}>{new Date(u.created_at).toLocaleDateString("uz-UZ")}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                {!(userTab==="teachers"?teachers:students).length&&<div style={{textAlign:"center",padding:32,color:"var(--text3)"}}>{userTab==="teachers"?"Hali o'qituvchi yo'q":"Hali o'quvchi yo'q"}</div>}
              </div>
            </Card>
          </div>
        )}
        {tab==="tests"&&(
          <div className="fade">
            <h2 style={{fontSize:20,fontWeight:800,color:"var(--text)",marginBottom:16}}>Barcha testlar</h2>
            {tests.map(t=>(
              <Card key={t.id} style={{marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <div style={{minWidth:0}}>
                  <div style={{color:"var(--text)",fontWeight:700,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div>
                  <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
                    <Badge color={t.active?"var(--green)":"var(--text3)"}>{t.active?"Faol":"Nofaol"}</Badge>
                    <span style={{color:"var(--text3)",fontSize:12}}>{t.question_count} savol · {t.time_limit} min</span>
                  </div>
                </div>
                <span style={{color:"var(--text3)",fontSize:12,whiteSpace:"nowrap"}}>{new Date(t.created_at).toLocaleDateString("uz-UZ")}</span>
              </Card>
            ))}
            {!tests.length&&<Card style={{textAlign:"center",padding:48}}><p style={{color:"var(--text3)"}}>Hali test yo'q</p></Card>}
          </div>
        )}
      </div>
    </div>
  );
};

// ── APP ───────────────────────────────────────────────────────
function App() {
  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [profileError,setProfileError]=useState("");
  const [session,setSession]=useState(null);
  const [lastResult,setLastResult]=useState(null);

  // ✅ BUG FIX: loadProfile — profil topilmasa o'zi yaratadi
  const loadProfile=useCallback(async(uid,authUser)=>{
    if(!uid){setAuthLoading(false);return;}
    setProfileError("");

    // 1: DB dan profil qidirish (3 marta urinish)
    let data=null;
    for(let i=0;i<3;i++){
      const {data:d}=await sb.from("profiles").select("*").eq("id",uid).single();
      if(d){data=d;break;}
      if(i<2) await new Promise(r=>setTimeout(r,600));
    }

    // 2: Topilmasa — o'zi yaratadi (auth.uid() = uid, shuning uchun RLS ishlaydi)
    if(!data){
      const email=authUser?.email||"";
      const meta=authUser?.user_metadata||{};
      const full_name=meta.full_name||email.split("@")[0]||"Foydalanuvchi";
      const role=meta.role||"student";

      await sb.from("profiles").upsert({
        id:uid,
        full_name,
        role,
        email
      },{onConflict:"id"});

      // Yaratilganidan keyin o'qish
      const {data:d3}=await sb.from("profiles").select("*").eq("id",uid).single();
      data=d3;
    }

    if(data){
      setProfile(data);
      setAuthLoading(false);
    } else {
      setProfileError("Profil yuklanmadi. Qayta urinib ko'ring.");
      setAuthLoading(false);
    }
  },[]);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session:s}})=>{
      const u=s?.user||null;setUser(u);
      if(u) loadProfile(u.id,u);
      else setAuthLoading(false);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((_event,s)=>{
      const u=s?.user||null;setUser(u);
      if(u) loadProfile(u.id,u);
      else{setProfile(null);setProfileError("");setAuthLoading(false);}
    });
    return()=>subscription.unsubscribe();
  },[loadProfile]);

  const handleLogout=async()=>{
    await sb.auth.signOut();
    setSession(null);
    setLastResult(null);
    setProfile(null);
  };

  const handleStart=({test,attemptNumber})=>{setLastResult(null);setSession({test,attemptNumber});};

  const handleFinish=async({answers,score,timeTaken,attemptNumber})=>{
    const test=session.test;
    const total=test.question_count;
    const percent=Math.round((score/total)*100);
    const grade=getGrade(score,total);
    await sb.from("results").insert({
      student_id:profile.id,test_id:test.id,score,total,percent,grade,
      time_taken:timeTaken,answers,attempt_number:attemptNumber,
      can_retry:false,finished_at:new Date().toISOString()
    });
    setLastResult({answers,score,timeTaken,test});
    setSession(null);
  };

  if(authLoading) return <LoadingPage text="Tizim yuklanmoqda..."/>;
  if(!user) return <AuthPages/>;
  if(profileError) return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:20,background:"var(--bg)"}}>
      <div style={{fontSize:48}}>⚠️</div>
      <p style={{color:"var(--red)",fontSize:16,textAlign:"center",maxWidth:320}}>{profileError}</p>
      <Btn onClick={async()=>{setProfileError("");setAuthLoading(true);const{data:{session:s}}=await sb.auth.getSession();if(s?.user)await loadProfile(s.user.id,s.user);}} variant="primary">Qayta urinish</Btn>
      <Btn onClick={handleLogout} variant="ghost" size="sm">Chiqish</Btn>
    </div>
  );
  if(!profile) return <LoadingPage text="Profil yuklanmoqda..."/>;
  if(session) return <TestPage profile={profile} test={session.test} attemptNumber={session.attemptNumber} onFinish={handleFinish}/>;
  if(lastResult) return <ResultPage profile={profile} test={lastResult.test} attempt={lastResult} onBack={()=>setLastResult(null)}/>;
  if(profile.role==="admin") return <AdminPanel profile={profile} onLogout={handleLogout}/>;
  if(profile.role==="teacher") return <TeacherPanel profile={profile} onLogout={handleLogout}/>;
  return <StudentEntry profile={profile} onStart={handleStart} onLogout={handleLogout}/>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
